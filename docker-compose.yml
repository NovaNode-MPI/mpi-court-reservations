services:
  db:
    image: postgres:16
    container_name: mpi_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mpi
      POSTGRES_USER: mpi
      POSTGRES_PASSWORD: mpi
    ports:
      - "5433:5432"
    volumes:
      - mpi_db_data:/var/lib/postgresql/data

volumes:
  mpi_db_data: